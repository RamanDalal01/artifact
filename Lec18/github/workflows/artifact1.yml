name: Artifact Demo

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create file
        run: echo "Hello World" > file.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: myfile
          path: file.txt