name: Lint Build Workflow

on:
  push:

jobs:
  lint_job:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Lint check
        run: echo "Lint passed ✅"

  build_job:
    runs-on: ubuntu-latest
    needs: lint_job

    steps:
      - uses: actions/checkout@v4

      - name: Build file
        run: echo "Build done 🚀" > build.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: buildfile
          path: build.txt